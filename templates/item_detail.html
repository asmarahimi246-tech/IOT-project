<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ item.name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#f5f7fb;margin:0;}
header{background:#0072CE;color:white;padding:16px 32px;font-size:22px;}
.container{max-width:800px;margin:auto;padding:30px;}
.item-img{width:100%;border-radius:12px;object-fit:cover;}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ddd;}
.btn-reserve{display:block;background:#00A676;color:white;text-align:center;padding:12px;border-radius:8px;font-weight:600;margin-top:20px;cursor:pointer;}
.btn-reserve:hover{background:#008a5b;}
</style>
</head>
<body>
<header>📦 {{ item.name }}</header>
<div class="container">
<img src="{{ item.image }}" class="item-img">
<h2>{{ item.name }}</h2>
<p>{{ item.description }}</p>
<p><strong>Price per day:</strong> €{{ item.price_per_day }}</p>

<label>Start Date:</label>
<input type="date" id="start">
<label>End Date:</label>
<input type="date" id="end">

<div class="btn-reserve" onclick="reserve()">Reserve Now</div>

<script>
async function reserve(){
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;
    if(!start||!end){ alert("Please select both dates"); return; }
    const res = await fetch("/reserve",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ item_id:{{item.id}}, start:start, end:end })
    });
    const data = await res.json();
    if(data.error){ alert(data.error); return; }
    alert(`Success!\nLocker: ${data.locker}\nRFID: ${data.rfid}`);
    window.location="/dashboard";
}
</script>
</div>
</body>
</html>
