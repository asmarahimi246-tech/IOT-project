<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{item.name}} - Leihothek</title>
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter';margin:0;background:#f4f6f9;}
.nav{background:white;padding:15px;display:flex;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
.nav a{margin-left:15px;text-decoration:none;color:#333;font-weight:500;}
.container{max-width:700px;margin:auto;padding:20px;}
img{width:100%;border-radius:12px;object-fit:cover;margin-bottom:15px;}
button{padding:10px;background:#0072CE;color:white;border:none;border-radius:8px;cursor:pointer;}
button:hover{background:#005bb5;}
</style>
</head>
<body>

<div class="nav">
  <b>📦 Leihothek</b>
  <div>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="container">
<h1>{{item.name}}</h1>
<img src="{{ url_for('static', filename=item.image) }}">
<p>{{item.description}}</p>
<p><b>€{{item.price_per_day}} / day</b></p>

<h3>Reserve</h3>
<label>Start date:</label>
<input type="date" id="start">
<label>End date:</label>
<input type="date" id="end">
<br><br>
<button onclick="reserve()">Reserve</button>

<p id="message"></p>
</div>

<script>
async function reserve(){
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;
    if(!start || !end){ alert("Select both dates"); return; }

    const res = await fetch("/reserve",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({item_id:{{item.id}}, start, end})
    });
    const data = await res.json();
    document.getElementById("message").textContent = data.message || data.error;
}
</script>

</body>
</html>
