<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body { font-family: sans-serif; background:#f5f7fb; display:flex; justify-content:center; align-items:center; height:100vh; }
form { background:white; padding:40px; border-radius:16px; box-shadow:0 5px 20px rgba(0,0,0,0.1); }
input { display:block; margin:10px 0; padding:10px; width:250px; border-radius:8px; border:1px solid #ddd; }
button { padding:10px 20px; border:none; border-radius:8px; background:#0072CE; color:white; cursor:pointer; }
.error { color:red; }
</style>
</head>
<body>
<form method="POST">
<h2>Login</h2>
{% if error %}<p class="error">{{error}}</p>{% endif %}
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
</body>
</html>
