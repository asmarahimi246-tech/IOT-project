<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leihothek - Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter';margin:0;background:#f4f6f9;}
.nav{background:white;padding:15px;display:flex;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
.nav a{margin-left:15px;text-decoration:none;color:#333;font-weight:500;}
.container{max-width:800px;margin:auto;padding:20px;}
input,textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc;}
button{padding:10px;background:#0072CE;color:white;border:none;border-radius:8px;cursor:pointer;}
button:hover{background:#005bb5;}
</style>
</head>
<body>

<div class="nav">
  <b>📦 Leihothek</b>
  <div>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="container">
<h1>Contact</h1>
<p>Email: info@leihothek.nl</p>

<h3>Send us a message</h3>
<form>
  <input type="text" placeholder="Name">
  <input type="email" placeholder="Email">
  <textarea placeholder="Message"></textarea>
  <button type="submit">Send</button>
</form>
</div>

</body>
</html>
